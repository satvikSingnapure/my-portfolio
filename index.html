<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      margin: 0 15px;
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin-top: 0;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      color: #22c55e;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 40px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>My Portfolio</h1>
  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="about">
  <h2>About Me</h2>
  <p>I am a developer who creates games and interactive projects. I enjoy building creative experiences and learning new technologies.</p>
</section>

<section id="projects">
  <h2>My Games</h2>
  <div class="projects" id="projectList"></div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<footer>
  <p>© 2026 My Portfolio</p>
</footer>

<script>
  const projects = [
    {
      name: "Game One",
      description: "A fun arcade-style game.",
      link: "https://example.com/game1"
    },
    {
      name: "Game Two",
      description: "A strategy-based puzzle game.",
      link: "https://example.com/game2"
    }
  ];

  const container = document.getElementById("projectList");

  projects.forEach(project => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${project.name}</h3>
      <p>${project.description}</p>
      <a href="${project.link}" target="_blank">Play Game</a>
    `;

    container.appendChild(card);
  });
</script>

</body>
</html>
