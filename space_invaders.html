<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Space Invaders</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
            background-color: #ffffff;
            border: 2px solid #0056b3;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 6 / 5;
        }
        canvas {
            display: block;
            background-color: #ffffff;
            width: 100%;
            height: 100%;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            color: #0056b3;
            z-index: 10;
        }
        .hidden {
            display: none !important;
        }
        h1 { margin: 0 0 20px 0; font-weight: 300; letter-spacing: 2px; }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            background-color: #003d80;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        button:active {
            transform: translateY(0);
        }
        #score-board {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #0056b3;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
            line-height: 1.4;
        }
        #hud-bottom {
            position: absolute;
            bottom: 15px;
            right: 20px;
            color: #0056b3;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
            text-align: right;
            line-height: 1.4;
        }
        .lives-display {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }
        .life-dot {
            width: 8px;
            height: 8px;
            background-color: #0056b3;
            border-radius: 50%;
        }
        .life-dot.empty {
            background-color: #e1efff;
        }
        .powerup-indicator {
            font-size: 12px;
            color: #00aaff;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-board">
        <div>Score: <span id="score-value">0</span></div>
        <div>Wave: <span id="wave-value">1</span></div>
    </div>
    <div id="hud-bottom">
        <div id="powerup-display"></div>
        <div class="lives-display" id="lives-display"></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay">
        <h1 id="status-text">SPACE INVADERS</h1>
        <button id="start-btn">START GAME</button>
        <p style="margin-top: 20px; font-size: 14px; color: #666;">Use Arrow Keys to Move & Space to Shoot</p>
    </div>
</div>

<script>
    // Get DOM elements first
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    const uiOverlay = document.getElementById('ui-overlay');
    const statusText = document.getElementById('status-text');
    const scoreBoard = document.getElementById('score-board');
    const gameContainer = document.getElementById('game-container');
    const scoreValue = document.getElementById('score-value');
    const waveValue = document.getElementById('wave-value');
    const livesDisplay = document.getElementById('lives-display');
    const powerupDisplay = document.getElementById('powerup-display');

    // Initialize game variables
    let WIDTH = 600;
    let HEIGHT = 500;
    let score = 0;
    let gameRunning = false;
    let player = null;
    let bullets = [];
    let enemies = [];
    let enemyBullets = [];
    let particles = [];
    let powerups = [];
    let wave = 1;
    let lives = 5;
    let enemyDirection = 1;
    let enemyMoveTimer = 0;
    let keys = {};
    let powerupSpawnTimer = 0;
    let activePowerups = {};
    let enemyShootChance = 0.02;
    let enemySpeed = 1;

    const COLORS = {
        primary: '#0056b3',
        secondary: '#e1efff',
        accent: '#00aaff',
        text: '#0056b3',
        bg: '#ffffff'
    };

    const POWERUP_TYPES = {
        RAPID_FIRE: 'rapid',
        SHIELD: 'shield',
        TRIPLE_SHOT: 'triple',
        SPEED_BOOST: 'speed'
    };

    // Classes
    class Player {
        constructor() {
            this.width = 40;
            this.height = 20;
            this.x = WIDTH / 2 - this.width / 2;
            this.y = HEIGHT - 40;
            this.speed = 5;
        }
        draw() {
            ctx.fillStyle = COLORS.primary;
            ctx.beginPath();
            ctx.moveTo(this.x + this.width / 2, this.y);
            ctx.lineTo(this.x + this.width, this.y + this.height);
            ctx.lineTo(this.x, this.y + this.height);
            ctx.closePath();
            ctx.fill();

            // Draw shield if active
            if (activePowerups[POWERUP_TYPES.SHIELD]) {
                ctx.strokeStyle = COLORS.accent;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y + this.height / 2, 30, 0, Math.PI * 2);
                ctx.stroke();
            }
        }
        update() {
            const speed = activePowerups[POWERUP_TYPES.SPEED_BOOST] ? this.speed * 1.5 : this.speed;
            if (keys['ArrowLeft'] && this.x > 0) this.x -= speed;
            if (keys['ArrowRight'] && this.x < WIDTH - this.width) this.x += speed;
        }
    }

    class Bullet {
        constructor(x, y, dy, color) {
            this.x = x;
            this.y = y;
            this.width = 3;
            this.height = 10;
            this.dy = dy;
            this.color = color;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - this.width / 2, this.y, this.width, this.height);
        }
        update() {
            this.y += this.dy;
        }
    }

    class Enemy {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = 30;
            this.height = 20;
            this.offset = Math.random() * Math.PI * 2;
        }
        draw() {
            const hover = Math.sin(Date.now() / 200 + this.offset) * 3;
            ctx.strokeStyle = COLORS.primary;
            ctx.lineWidth = 2;
            ctx.strokeRect(this.x, this.y + hover, this.width, this.height);
            ctx.fillStyle = COLORS.primary;
            ctx.fillRect(this.x + 10, this.y + 5 + hover, 10, 10);
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3 + 1;
            this.dx = (Math.random() - 0.5) * 4;
            this.dy = (Math.random() - 0.5) * 4;
            this.life = 1.0;
        }
        draw() {
            ctx.fillStyle = `rgba(0, 86, 179, ${this.life})`;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
        update() {
            this.x += this.dx;
            this.y += this.dy;
            this.life -= 0.02;
        }
    }

    class Powerup {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.width = 20;
            this.height = 20;
            this.rotation = 0;
        }
        draw() {
            this.rotation += 0.05;
            ctx.save();
            ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
            ctx.rotate(this.rotation);
            
            const colors = {
                rapid: '#FF6B6B',
                shield: '#4ECDC4',
                triple: '#FFE66D',
                speed: '#95E1D3'
            };
            
            ctx.fillStyle = colors[this.type] || COLORS.accent;
            ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
            ctx.restore();
        }
        update() {
            this.y += 2;
        }
    }

    // Functions
    function resize() {
        WIDTH = gameContainer.clientWidth;
        HEIGHT = gameContainer.clientHeight;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;
        if (player) {
            player.y = HEIGHT - 40;
            player.x = Math.min(player.x, WIDTH - player.width);
        }
    }

    function updateWaveDifficulty() {
        if (wave === 1) {
            enemyShootChance = 0.01;
            enemySpeed = 1;
        } else if (wave === 2) {
            enemyShootChance = 0.015;
            enemySpeed = 1.3;
        } else if (wave === 3) {
            enemyShootChance = 0.02;
            enemySpeed = 1.6;
        } else {
            enemyShootChance = 0.025;
            enemySpeed = 2;
        }
    }

    function init() {
        resize();
        player = new Player();
        bullets = [];
        enemyBullets = [];
        enemies = [];
        particles = [];
        powerups = [];
        score = 0;
        wave = 1;
        lives = 5;
        activePowerups = {};
        powerupSpawnTimer = 0;
        enemyDirection = 1;
        enemyMoveTimer = 0;
        scoreValue.innerText = score;
        waveValue.innerText = wave;
        updateWaveDifficulty();
        updateLivesDisplay();
        updatePowerupDisplay();
        spawnWave();
    }

    function spawnWave() {
        const enemyCount = 4 + wave * 2;
        const rows = Math.min(4, Math.ceil(enemyCount / 8));
        let count = 0;
        for (let row = 0; row < rows && count < enemyCount; row++) {
            for (let col = 0; col < 8 && count < enemyCount; col++) {
                enemies.push(new Enemy(col * 60 + 70, row * 40 + 50));
                count++;
            }
        }
    }

    function spawnExplosion(x, y) {
        for (let i = 0; i < 10; i++) {
            particles.push(new Particle(x, y));
        }
    }

    function spawnPowerup(x, y) {
        const types = Object.values(POWERUP_TYPES);
        const randomType = types[Math.floor(Math.random() * types.length)];
        powerups.push(new Powerup(x, y, randomType));
    }

    function activatePowerup(type) {
        if (type === POWERUP_TYPES.SHIELD) {
            activePowerups[POWERUP_TYPES.SHIELD] = 300; // 300 frames
        } else if (type === POWERUP_TYPES.RAPID_FIRE) {
            activePowerups[POWERUP_TYPES.RAPID_FIRE] = 300;
        } else if (type === POWERUP_TYPES.SPEED_BOOST) {
            activePowerups[POWERUP_TYPES.SPEED_BOOST] = 300;
        } else if (type === POWERUP_TYPES.TRIPLE_SHOT) {
            activePowerups[POWERUP_TYPES.TRIPLE_SHOT] = 300;
        }
        updatePowerupDisplay();
    }

    function updatePowerupDisplay() {
        let text = '';
        if (activePowerups[POWERUP_TYPES.SHIELD] && activePowerups[POWERUP_TYPES.SHIELD] > 0) {
            text += '🛡️ Shield ';
        }
        if (activePowerups[POWERUP_TYPES.RAPID_FIRE] && activePowerups[POWERUP_TYPES.RAPID_FIRE] > 0) {
            text += '⚡ Rapid ';
        }
        if (activePowerups[POWERUP_TYPES.SPEED_BOOST] && activePowerups[POWERUP_TYPES.SPEED_BOOST] > 0) {
            text += '💨 Speed ';
        }
        if (activePowerups[POWERUP_TYPES.TRIPLE_SHOT] && activePowerups[POWERUP_TYPES.TRIPLE_SHOT] > 0) {
            text += '3️⃣ Triple ';
        }
        powerupDisplay.innerHTML = text ? `<div class="powerup-indicator">${text}</div>` : '';
    }

    function updateLivesDisplay() {
        livesDisplay.innerHTML = '';
        for (let i = 0; i < 5; i++) {
            const dot = document.createElement('div');
            dot.className = i < lives ? 'life-dot' : 'life-dot empty';
            livesDisplay.appendChild(dot);
        }
    }

    function update() {
        if (!gameRunning || !player) return;

        player.update();

        // Update powerup timers
        Object.keys(activePowerups).forEach(key => {
            activePowerups[key]--;
            if (activePowerups[key] <= 0) {
                delete activePowerups[key];
                updatePowerupDisplay();
            }
        });

        bullets.forEach((b, i) => {
            b.update();
            if (b.y < 0) bullets.splice(i, 1);
        });

        enemyMoveTimer++;
        let moveDown = false;
        if (enemyMoveTimer > 30 / enemySpeed) {
            enemies.forEach(e => {
                e.x += 10 * enemyDirection;
                if (e.x > WIDTH - 40 || e.x < 10) moveDown = true;
            });
            if (moveDown) {
                enemyDirection *= -1;
                enemies.forEach(e => e.y += 20);
            }
            enemyMoveTimer = 0;
        }

        // Powerup spawning
        powerupSpawnTimer++;
        if (powerupSpawnTimer > 1200) { // ~20 seconds at 60fps
            if (enemies.length > 0) {
                const randomEnemy = enemies[Math.floor(Math.random() * enemies.length)];
                spawnPowerup(randomEnemy.x, randomEnemy.y);
            }
            powerupSpawnTimer = 0;
        }

        // Enemy shooting
        if (Math.random() < enemyShootChance && enemies.length > 0) {
            const shooter = enemies[Math.floor(Math.random() * enemies.length)];
            enemyBullets.push(new Bullet(shooter.x + shooter.width / 2, shooter.y + shooter.height, 4, COLORS.accent));
        }

        // Enemy Bullets
        enemyBullets.forEach((b, i) => {
            b.update();
            if (b.y > HEIGHT) enemyBullets.splice(i, 1);
            if (b.x > player.x && b.x < player.x + player.width && b.y > player.y && b.y < player.y + player.height) {
                if (activePowerups[POWERUP_TYPES.SHIELD]) {
                    delete activePowerups[POWERUP_TYPES.SHIELD];
                    updatePowerupDisplay();
                    enemyBullets.splice(i, 1);
                } else {
                    lives--;
                    updateLivesDisplay();
                    if (lives <= 0) {
                        gameOver("GAME OVER");
                    } else {
                        player.x = WIDTH / 2 - player.width / 2;
                        player.y = HEIGHT - 40;
                    }
                }
            }
        });

        // Powerup collection
        powerups.forEach((p, i) => {
            p.update();
            if (p.y > HEIGHT) powerups.splice(i, 1);
            if (p.x > player.x && p.x < player.x + player.width && p.y > player.y && p.y < player.y + player.height) {
                activatePowerup(p.type);
                powerups.splice(i, 1);
            }
        });

        // Collision Detection
        bullets.forEach((b, bi) => {
            enemies.forEach((e, ei) => {
                if (b.x > e.x && b.x < e.x + e.width && b.y > e.y && b.y < e.y + e.height) {
                    spawnExplosion(e.x + e.width / 2, e.y + e.height / 2);
                    enemies.splice(ei, 1);
                    bullets.splice(bi, 1);
                    score += 10;
                    scoreValue.innerText = score;
                }
            });
        });

        // Particles
        particles.forEach((p, i) => {
            p.update();
            if (p.life <= 0) particles.splice(i, 1);
        });

        // Wave completion
        if (enemies.length === 0) {
            wave++;
            waveValue.innerText = wave;
            updateWaveDifficulty();
            spawnWave();
        }

        // Lose Condition (Enemies reach bottom)
        enemies.forEach(e => {
            if (e.y + e.height > player.y) {
                gameOver("GAME OVER");
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        if (player) player.draw();
        bullets.forEach(b => b.draw());
        enemyBullets.forEach(b => b.draw());
        enemies.forEach(e => e.draw());
        powerups.forEach(p => p.draw());
        particles.forEach(p => p.draw());
    }

    function gameLoop() {
        if (!gameRunning) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function gameOver(text) {
        gameRunning = false;
        statusText.innerText = text;
        startBtn.innerText = "RESTART";
        uiOverlay.classList.remove('hidden');
    }

    // Event Listeners
    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code === 'Space' && gameRunning && player) {
            const bulletLimit = activePowerups[POWERUP_TYPES.RAPID_FIRE] ? 6 : 3;
            if (bullets.length < bulletLimit) {
                if (activePowerups[POWERUP_TYPES.TRIPLE_SHOT]) {
                    bullets.push(new Bullet(player.x + player.width / 2 - 10, player.y, -7, COLORS.primary));
                    bullets.push(new Bullet(player.x + player.width / 2, player.y, -7, COLORS.primary));
                    bullets.push(new Bullet(player.x + player.width / 2 + 10, player.y, -7, COLORS.primary));
                } else {
                    bullets.push(new Bullet(player.x + player.width / 2, player.y, -7, COLORS.primary));
                }
            }
            e.preventDefault();
        }
    });

    window.addEventListener('keyup', (e) => {
        keys[e.code] = false;
    });

    window.addEventListener('resize', resize);

    startBtn.addEventListener('click', () => {
        uiOverlay.classList.add('hidden');
        init();
        gameRunning = true;
        gameLoop();
    });

    // Initial setup
    resize();
    init();
    draw();
</script>

</body>
</html>
